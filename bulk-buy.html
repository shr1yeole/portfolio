<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bulk Buy Components - DADA'S I.T SERVICES & SECURITY SOLUTIONS</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #eef2f3 0%, #8ec5fc 100%);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(20,20,40, 0.95) !important;
            box-shadow: 0 2px 16px rgba(32,40,68,.06);
        }
        .navbar-brand {
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.5rem;
            color: #24a0ed !important;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .navbar-nav .nav-link.active {
            color: #fff !important;
            font-weight: bold;
        }
        .navbar-nav .nav-link {
            color: #ced6e0 !important;
            transition: color .2s;
        }
        .navbar-nav .nav-link:hover {
            color: #24a0ed !important;
        }
        .page-header {
            background: linear-gradient(120deg, #3a7bd5b8 0%, #00d2ffbe 100%),
                        url('https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
            color: white;
            padding: 100px 0 60px;
            text-align: center;
            position: relative;
        }
        .page-header::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 100%; height: 18px;
            background: linear-gradient(to bottom, #ffffff00, #eef2f3 95%);
            z-index: 1;
        }
        .page-header h1 {
            font-weight: 900;
            font-size: 2.6rem;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }
        .page-header p {
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 0;
            position: relative;
            z-index: 2;
        }
        .form-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.13);
            padding: 2rem;
            max-width: 720px;
            margin: 0 auto 4rem auto;
        }
        .form-card h2 {
            text-align: center;
            color: #31416a;
            margin-bottom: 1.5rem;
            font-weight: 900;
        }
        .form-floating > input,
        .form-floating > select,
        .form-floating > textarea {
            border-radius: 12px;
            padding: 1rem .75rem .25rem .75rem;
        }
        .btn-primary {
            background: linear-gradient(120deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 20px;
            padding: 0.6rem 1.8rem;
            font-size: 1rem;
            display: block;
            margin: 1.5rem auto 0 auto;
        }
        .btn-primary:hover {
            background: linear-gradient(120deg, #00d2ff, #3a7bd5);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-shield-halved me-2"></i><b>DADA'S I.T SERVICES</b>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa fa-home me-1"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html"><i class="fa fa-box-open me-1"></i>Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html"><i class="fa fa-cogs me-1"></i>Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html"><i class="fa fa-envelope me-1"></i>Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html"><i class="fa fa-info-circle me-1"></i>About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="fa fa-shopping-cart me-1"></i>Bulk Buy</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Bulk Buy Components</h1>
        <p>Order in bulk with ease for your projects and business needs.</p>
    </div>

    <!-- Bulk Order Form -->
    <div class="form-card">
        <h2>Bulk Order Form</h2>
        <form id="bulkOrderForm" action="#" method="POST">
            <!-- Buyer info -->
            <div class="row g-3 mb-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="buyerName" name="buyerName" placeholder="Your Full Name" required />
                    <label for="buyerName">Full Name</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="email" class="form-control" id="buyerEmail" name="buyerEmail" placeholder="email@example.com" required />
                    <label for="buyerEmail">Email address</label>
                </div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6 form-floating">
                    <input type="tel" class="form-control" id="buyerPhone" name="buyerPhone" placeholder="Phone Number" required />
                    <label for="buyerPhone">Phone Number</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="companyName" name="companyName" placeholder="Company (optional)" />
                    <label for="companyName">Company Name (optional)</label>
                </div>
            </div>

            <!-- Products bulk order -->
            <h5 class="mb-3 mt-4">Select Products & Quantity</h5>
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <select class="form-select" id="product1" name="product1" required>
                        <option value="" selected disabled>Choose product</option>
                        <option value="Motherboard">Motherboard</option>
                        <option value="Processor">Processor</option>
                        <option value="Memory (RAM)">Memory (RAM)</option>
                        <option value="Graphics Card">Graphics Card</option>
                        <option value="Solid State Drive">Solid State Drive</option>
                        <option value="Hard Drive">Hard Drive</option>
                        <option value="Power Supply Unit">Power Supply Unit</option>
                        <option value="Cooling Solutions">Cooling Solutions</option>
                        <option value="Monitor">Monitor</option>
                        <option value="Keyboard">Keyboard</option>
                        <option value="Mouse">Mouse</option>
                        <option value="Headphones">Headphones</option>
                    </select>
                    <label for="product1">Product 1</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="number" min="1" class="form-control" id="quantity1" name="quantity1" placeholder="Quantity" required />
                    <label for="quantity1">Quantity</label>
                </div>
            </div>

            <!-- Add more products -->
            <div id="additionalProducts"></div>

            <button type="button" class="btn btn-outline-primary mt-3" id="addProductBtn">
                <i class="fa fa-plus"></i> Add Another Product
            </button>

            <!-- Address and Comments -->
            <div class="form-floating mt-4">
                <textarea class="form-control" placeholder="Delivery Address" id="deliveryAddress" name="deliveryAddress" style="height: 80px" required></textarea>
                <label for="deliveryAddress">Delivery Address</label>
            </div>

            <div class="form-floating mt-3">
                <textarea class="form-control" placeholder="Additional Notes or Requests (optional)" id="additionalNotes" name="additionalNotes" style="height: 80px"></textarea>
                <label for="additionalNotes">Additional Notes (optional)</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary">Submit Bulk Order</button>
        </form>
    </div>

    <!-- Footer -->
    <footer class="text-white text-center py-4 mt-4" style="background: linear-gradient(90deg,#252959 0,#05568e 100%);">
        <p>
            <i class="fa-solid fa-shield-halved text-info"></i>
            © 2025 DADA'S I.T SERVICES & SECURITY SOLUTIONS | All Rights Reserved
        </p>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Script to dynamically add product rows in the form
        let productCount = 1;
        const maxProducts = 10;
        const addProductBtn = document.getElementById('addProductBtn');
        const additionalProductsDiv = document.getElementById('additionalProducts');

        addProductBtn.addEventListener('click', () => {
            if (productCount >= maxProducts) {
                alert('You can add up to ' + maxProducts + ' products only.');
                return;
            }
            productCount++;
            const productHtml = `
                <div class="row g-3 mt-3">
                    <div class="col-md-6 form-floating">
                        <select class="form-select" id="product${productCount}" name="product${productCount}" required>
                            <option value="" selected disabled>Choose product</option>
                            <option value="Motherboard">Motherboard</option>
                            <option value="Processor">Processor</option>
                            <option value="Memory (RAM)">Memory (RAM)</option>
                            <option value="Graphics Card">Graphics Card</option>
                            <option value="Solid State Drive">Solid State Drive</option>
                            <option value="Hard Drive">Hard Drive</option>
                            <option value="Power Supply Unit">Power Supply Unit</option>
                            <option value="Cooling Solutions">Cooling Solutions</option>
                            <option value="Monitor">Monitor</option>
                            <option value="Keyboard">Keyboard</option>
                            <option value="Mouse">Mouse</option>
                            <option value="Headphones">Headphones</option>
                        </select>
                        <label for="product${productCount}">Product ${productCount}</label>
                    </div>
                    <div class="col-md-6 form-floating">
                        <input type="number" min="1" class="form-control" id="quantity${productCount}" name="quantity${productCount}" placeholder="Quantity" required />
                        <label for="quantity${productCount}">Quantity</label>
                    </div>
                </div>
            `;
            additionalProductsDiv.insertAdjacentHTML('beforeend', productHtml);
        });

        // Form submit handler (for demo, prevent actual submit)
        document.getElementById('bulkOrderForm').addEventListener('submit', function(e){
            e.preventDefault();
            alert('Thank you for your bulk order! We will get back to you soon.');
            this.reset();
            productCount = 1;
            additionalProductsDiv.innerHTML = '';
        });
    </script>
</body>
</html>
