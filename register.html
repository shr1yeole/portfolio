<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - DADA'S I.T SERVICES & SECURITY SOLUTIONS</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
    }

    body {
      background: linear-gradient(-45deg, #eef2f3, #8ec5fc, #3a7bd5, #00d2ff);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .navbar {
      background: rgba(20,20,40, 0.95) !important;
      box-shadow: 0 2px 16px rgba(32,40,68,.06);
    }
    .navbar-brand {
      font-weight: bold;
      letter-spacing: 2px;
      font-size: 1.5rem;
      color: #24a0ed !important;
      text-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .navbar-nav .nav-link.active {
      color: #fff !important;
      font-weight: bold;
    }
    .navbar-nav .nav-link {
      color: #ced6e0 !important;
      transition: color .2s;
    }
    .navbar-nav .nav-link:hover {
      color: #24a0ed !important;
    }

    .flex-fill {
      flex: 1 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
    }

    .register-card {
      background: rgba(255,255,255,0.75);
      border-radius: 20px;
      box-shadow: 0 10px 32px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      padding: 2rem;
      max-width: 450px;
      width: 100%;
      animation: fadeInUp 0.7s ease forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .register-card h3 {
      text-align: center;
      color: #31416a;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .input-group-text {
      background: #fff;
      border-radius: 10px 0 0 10px;
    }

    .form-control {
      border-radius: 0 10px 10px 0;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .form-control:focus {
      border-color: #24a0ed;
      box-shadow: 0 0 0 .2rem rgba(36,160,237,0.25);
    }

    .btn-primary {
      background: linear-gradient(120deg, #3a7bd5, #00d2ff);
      border: none;
      border-radius: 20px;
      font-weight: bold;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s ease-in-out;
    }
    .btn-primary:hover {
      background: linear-gradient(120deg, #00d2ff, #3a7bd5);
      transform: scale(1.03);
    }

    .register-card a {
      color: #24a0ed;
      text-decoration: none;
    }
    .register-card a:hover {
      text-decoration: underline;
    }

    footer {
      background: linear-gradient(90deg,#252959 0,#05568e 100%);
      color: #fff;
      padding: 1rem 0;
      flex-shrink: 0;
    }
    footer p {
      margin-bottom: 0;
      font-size: 1rem;
      opacity: .80;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fa-solid fa-shield-halved me-2"></i><b>DADA'S I.T SERVICES</b>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa fa-home me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html"><i class="fa fa-info-circle me-1"></i>About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Registration Form -->
  <div class="flex-fill">
    <div class="register-card">
      <h3><i class="fa fa-user-plus me-2 text-primary"></i>Register</h3>
      <form id="registerForm">
        <!-- Full Name -->
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fa fa-user"></i></span>
          <input type="text" class="form-control" placeholder="Full Name" required>
        </div>
        <!-- Email -->
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fa fa-envelope"></i></span>
          <input type="email" class="form-control" placeholder="Email Address" required>
        </div>
        <!-- Phone -->
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fa fa-phone"></i></span>
          <input type="tel" class="form-control" placeholder="Phone Number" required>
        </div>
        <!-- Password -->
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fa fa-lock"></i></span>
          <input type="password" class="form-control" placeholder="Password" required>
        </div>
        <!-- Confirm Password -->
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fa fa-lock"></i></span>
          <input type="password" class="form-control" placeholder="Confirm Password" required>
        </div>
        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">Register</button>
        <p class="text-center mt-3 mb-0">Already have an account? <a href="login.html">Login here</a></p>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-white text-center">
    <p><i class="fa-solid fa-shield-halved text-info"></i>
      © 2025 DADA'S I.T SERVICES & SECURITY SOLUTIONS | All Rights Reserved</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Redirect to login.html on form submit
    document.getElementById('registerForm').addEventListener('submit', function(e){
      e.preventDefault(); // stop form from submitting to a server
      // Here you can also add a success message or delay if you want
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
